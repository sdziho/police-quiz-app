buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.0.21"
        reactNativeVersion = "0.77.3"
        gradlePluginVersion = "8.0.2"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:${gradlePluginVersion}")
        classpath("com.facebook.react:react-native-gradle-plugin:${reactNativeVersion}")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:${kotlinVersion}")
        classpath("com.google.gms:google-services:4.4.4")
    }
}

def hermesOldPath = file("$rootDir/../node_modules/react-native/sdks/hermes-engine/version.properties")
def hermesNewPath = file("$rootDir/../node_modules/react-native/sdks/.hermesversion")

if (!hermesOldPath.exists() && hermesNewPath.exists()) {
    println("⚙️ React Native Hermes compatibility fix applied.")
    hermesOldPath.parentFile.mkdirs()
    hermesOldPath.text = "version=" + hermesNewPath.text.trim()
}

apply plugin: "com.facebook.react.rootproject"